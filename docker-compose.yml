version: "3.9"

# ══════════════════════════════════════════════════════════════════
#  Wiki.js MCP Server
#  Image is built automatically by GitHub Actions and hosted on
#  GitHub Container Registry (ghcr.io) — no build step on the NAS.
#
#  Set these in Portainer → Environment variables before deploying:
#    WIKIJS_URL      → https://mywiki.aditnas.org
#    WIKIJS_API_KEY  → your API key from Wiki.js Admin → API Access
# ══════════════════════════════════════════════════════════════════

services:
  wikijs-mcp:
    image: ghcr.io/adihamad/wikijs-mcp:latest
    container_name: wikijs-mcp
    restart: unless-stopped
    ports:
      - "3010:3001"
    environment:
      WIKIJS_URL:     ${WIKIJS_URL}
      WIKIJS_API_KEY: ${WIKIJS_API_KEY}
      MCP_PORT:       3001
      MCP_HOST:       0.0.0.0
